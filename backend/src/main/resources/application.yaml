spring:
  application:
    name: darb-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:darb}
    username: ${DB_USER:darb}
    password: ${DB_PASSWORD:darb}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

darb:
  security:
    jwt:
      secret: ${JWT_SECRET:changeThisToASecretKeyWithAtLeast256BitsForHS256Algorithm}
      access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
      refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

springdoc:
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: method
    doc-expansion: none
  api-docs:
    path: /v3/api-docs
  show-actuator: false

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:darb}
    username: ${DB_USER:darb}
    password: ${DB_PASSWORD:darb}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

darb:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
      refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

springdoc:
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: method
    doc-expansion: none
  api-docs:
    path: /v3/api-docs
  show-actuator: false

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://${TEST_DB_HOST:localhost}:${TEST_DB_PORT:5432}/${TEST_DB_NAME:darb_test}
    username: ${TEST_DB_USER:darb}
    password: ${TEST_DB_PASSWORD:darb}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 0

darb:
  security:
    jwt:
      secret: testSecretKeyWithAtLeast256BitsForHS256AlgorithmTestingOnly
      access-token-expiration: 900000
      refresh-token-expiration: 604800000

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: openapi
  datasource:
    url: jdbc:h2:mem:darbopenapi;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

server:
  port: ${SERVER_PORT:8080}

darb:
  security:
    jwt:
      secret: openApiProfileSecretKeyWithAtLeast256BitsForHS256Algorithm
      access-token-expiration: 900000
      refresh-token-expiration: 604800000

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui
  api-docs:
    enabled: true
    path: /v3/api-docs
