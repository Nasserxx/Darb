services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-darb}
      POSTGRES_USER: ${DB_USER:-darb}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-darb}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-darb}
      DB_USER: ${DB_USER:-darb}
      DB_PASSWORD: ${DB_PASSWORD:-darb}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
